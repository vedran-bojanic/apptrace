services:
  postgres:
    image: postgres:16
    container_name: apptrace-postgres
    environment:
      POSTGRES_DB: apptrace
      POSTGRES_USER: apptrace
      POSTGRES_PASSWORD: apptrace
    ports:
      - "5432:5432"
    volumes:
      - apptrace-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apptrace -d apptrace"]
      interval: 5s
      timeout: 5s
      retries: 5

  apptrace-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apptrace-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apptrace
      SPRING_DATASOURCE_USERNAME: apptrace
      SPRING_DATASOURCE_PASSWORD: apptrace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  apptrace-data:
