spring:
  application:
    name: apptrace-server

  datasource:
    url: jdbc:postgresql://localhost:5432/apptrace
    username: apptrace
    password: apptrace
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, Hibernate only validates
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

logging:
  level:
    io.apptrace: DEBUG
    org.flywaydb: INFO
